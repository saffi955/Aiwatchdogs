name: model-drift-watchdog

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write   # the job commits results + history back to the repo

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchdog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # GitHub reserves the GITHUB_ prefix for secrets, so this one is named TITHUB_MODELS_API_KEY.
          TITHUB_MODELS_API_KEY: ${{ secrets.TITHUB_MODELS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.runner

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "watchdog run $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
