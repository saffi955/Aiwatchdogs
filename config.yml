# Model Drift Watchdog — configuration
# Everything the watchdog watches and how it scores drift lives here.
# Add a model = add a list entry. Add a new provider family = add an adapter in
# src/providers/ and reference it by `provider:`. No other code changes.
#
# `env_key` names the environment variable / GitHub secret holding that
# provider's API key. Keys are NEVER stored here.

run:
  system_prompt: "You are a helpful assistant."   # neutral, so verbosity tests
                                                  # measure true default
                                                  # chattiness; determinism comes
                                                  # from temperature 0.
  temperature: 0
  max_tokens: 512
  timeout_s: 30
  retries: 3            # transport retries; an API error is NOT counted as drift
  retry_backoff_s: 2    # exponential: 2s, 4s, 8s ...
  request_delay_s: 1.5  # pause between prompts to respect free-tier rate limits

scoring:
  weights:              # composite drift score; must sum to 1.0
    format_compliance: 0.25
    instruction_following: 0.20
    classification_stability: 0.20
    math_reasoning: 0.15
    extraction_accuracy: 0.10
    refusal_boundary: 0.10
  baseline_days: 14              # rolling window for "normal"
  calibration_days: 3            # first N days: record only, never alert
  drift_drop_threshold: 15       # alert if score falls this far below baseline
  category_collapse_threshold: 50  # alert if any single category drops below this
  consecutive_breaches: 2        # require N breaching runs in a row before alert
  verbosity_z_threshold: 2.0     # |z| beyond this applies a -5 penalty
  latency_z_threshold: 2.0       # z beyond this applies a -5 penalty
  penalty_points: 5

alerting:
  discord: true                  # requires DISCORD_WEBHOOK_URL secret
  heartbeat: true                # post a per-run summary to Discord EVERY run
                                 # (all-clear + any drift), not only on breach.
                                 # A run with no breach still pings, so you always
                                 # know the watchdog — and the webhook — are alive.

# Models to watch. Watching a moving alias alongside a pinned version is the
# "proven silent swap" signal: if the alias drifts but the version doesn't, the
# provider quietly re-pointed the alias.
#
# NOTE: only the Gemini models were live-verified in the build environment (its
# network policy blocks the other hosts). Groq / OpenRouter / GitHub Models run
# fine on the GitHub Actions runner (open network) once their secrets are set;
# if a model id is wrong it's recorded as an ERROR (not drift) — a one-line fix.
models:
  # --- Google AI Studio (free tier) --------------------------------------
  - name: gemini-flash-lite (alias)
    provider: gemini
    model_id: gemini-flash-lite-latest
    env_key: GEMINI_API_KEY
    watch: true

  - name: gemini-3.1-flash-lite (version)
    provider: gemini
    model_id: gemini-3.1-flash-lite
    env_key: GEMINI_API_KEY
    watch: true

  # --- Groq (free tier, OpenAI-compatible) -------------------------------
  - name: groq-llama-3.3-70b
    provider: openai_compat
    model_id: llama-3.3-70b-versatile
    base_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    watch: true

  # Bigger Groq free-tier models. Groq's free RPM/RPD are generous enough to run
  # the full suite for several models. ids follow Groq's model catalog; a wrong id
  # is recorded as an ERROR (never drift) — a one-line fix. No model below is
  # watched on another provider (no duplicates).
  - name: groq-kimi-k2
    provider: openai_compat
    model_id: moonshotai/kimi-k2-instruct
    base_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    watch: true

  - name: groq-deepseek-r1-70b
    provider: openai_compat
    model_id: deepseek-r1-distill-llama-70b
    base_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    watch: true

  - name: groq-gpt-oss-120b
    provider: openai_compat
    model_id: openai/gpt-oss-120b
    base_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    watch: true

  # --- OpenRouter (free model, OpenAI-compatible) ------------------------
  # Confirm the exact free model id at https://openrouter.ai/models?max_price=0
  # WARNING: OpenRouter's free tier is capped at ~50 requests/DAY per account
  # (until you add credit), shared across ALL ":free" models. This suite sends
  # 38 prompts x 4 runs/day = ~152 requests/day, so this row WILL 429 for most of
  # the day no matter which free model is chosen — those 429s are recorded as
  # ERROR, never drift. The previous llama-3.3-70b:free row died this way and was
  # also a duplicate of groq-llama-3.3-70b above. Swapped to a distinct big model.
  # To make this row reliable: add OpenRouter credit, or set watch:false / drop it.
  - name: openrouter-qwen3-235b (free)
    provider: openai_compat
    model_id: qwen/qwen3-235b-a22b:free
    base_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    watch: true

  # --- GitHub Models (free preview, OpenAI-compatible) -------------------
  - name: github-gpt-4o-mini
    provider: openai_compat
    model_id: openai/gpt-4o-mini
    base_url: https://models.github.ai/inference
    env_key: TITHUB_MODELS_API_KEY   # GitHub reserves the GITHUB_ prefix; this secret uses TITHUB_
    watch: true
